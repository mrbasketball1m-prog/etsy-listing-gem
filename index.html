<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etsy Listing Generator</title>
<style>
  :root { --bg:#faf8f5; --card:#fff; --ink:#1a1a1a; --accent:#e06b3e; --muted:#777; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); margin:0; padding:24px; }
  .wrap { max-width:640px; margin:0 auto; }
  h1 { font-size:1.6rem; margin:0 0 4px; }
  p.sub { color:var(--muted); margin:0 0 24px; }
  label { display:block; font-weight:600; margin:14px 0 6px; font-size:.92rem; }
  input, textarea { width:100%; padding:11px 12px; border:1px solid #ddd; border-radius:10px; font-size:1rem; font-family:inherit; }
  textarea { min-height:70px; resize:vertical; }
  button { margin-top:18px; width:100%; padding:13px; border:0; border-radius:10px; background:var(--accent); color:#fff; font-size:1.05rem; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .out { white-space:pre-wrap; background:var(--card); border:1px solid #eee; border-radius:12px; padding:16px; margin-top:20px; display:none; line-height:1.5; }
  .trial { text-align:center; color:var(--muted); font-size:.85rem; margin-top:14px; }
  .pay { display:none; background:#fff4ee; border:1px solid #f3cdb9; border-radius:12px; padding:16px; margin-top:18px; text-align:center; }
  a { color:var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Etsy Listing Generator</h1>
  <p class="sub">SEO-optimized title, description & 13 tags in seconds. Built to rank and sell.</p>

  <label>Product</label>
  <input id="product" placeholder="e.g. handmade ceramic coffee mug, matte black, 350ml">

  <label>Seed keywords (optional)</label>
  <input id="keywords" placeholder="e.g. minimalist mug, gift for coffee lover">

  <label>Extra details (optional)</label>
  <textarea id="details" placeholder="material, size, who it's for, personalization, occasion..."></textarea>

  <button id="go">Generate listing</button>
  <div class="trial" id="trial"></div>

  <div class="out" id="out"></div>

  <div class="pay" id="pay">
    <strong>Free trial used up.</strong><br>
    Unlock unlimited listings — <a href="#REPLACE_WITH_YOUR_CHECKOUT_LINK">get access &rarr;</a>
  </div>
</div>

<script>
  // 1) вставь URL своего Railway-бэкенда:
  const BACKEND = "https://REPLACE-WITH-YOUR-RAILWAY-URL.up.railway.app";
  const FREE = 3;

  const usedN = () => parseInt(localStorage.getItem("gen_used") || "0", 10);
  const setUsed = (n) => { localStorage.setItem("gen_used", n); render(); };

  function render() {
    const left = Math.max(0, FREE - usedN());
    document.getElementById("trial").textContent = left > 0 ? `${left} free listing(s) left` : "";
    document.getElementById("pay").style.display = left > 0 ? "none" : "block";
    document.getElementById("go").disabled = left <= 0;
  }
  render();

  document.getElementById("go").addEventListener("click", async () => {
    if (usedN() >= FREE) return;
    const product = document.getElementById("product").value.trim();
    if (!product) { alert("Add a product first"); return; }

    const btn = document.getElementById("go");
    const out = document.getElementById("out");
    btn.disabled = true; btn.textContent = "Generating...";

    try {
      const r = await fetch(BACKEND + "/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          product,
          keywords: document.getElementById("keywords").value.trim(),
          details: document.getElementById("details").value.trim()
        })
      });
      const data = await r.json();
      if (data.result) {
        out.textContent = data.result;
        out.style.display = "block";
        setUsed(usedN() + 1);
      } else {
        out.textContent = "Error: " + (data.error || "unknown");
        out.style.display = "block";
      }
    } catch (e) {
      out.textContent = "Network error: " + e.message;
      out.style.display = "block";
    } finally {
      btn.textContent = "Generate listing";
      render();
    }
  });
</script>
</body>
</html>
